<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Admission Portal - Pine Hills School</title>
    <!-- Google Fonts & Font Awesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #002d72;
            --accent-blue: #1d4ed8;
            --light-bg: #f8fafc;
            --text-dark: #0f172a;
            --text-muted: #475569;
            --white: #ffffff;
            --border-color: #cbd5e1;
            --shadow-lg: 0 20px 40px -10px rgba(0, 45, 114, 0.1);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Poppins', sans-serif; 
        }

        body { 
            background: #f1f5f9; 
            color: var(--text-dark); 
            min-height: 100vh; 
            padding-bottom: 60px; 
        }

        .container { 
            max-width: 750px; 
            margin: 40px auto; 
            padding: 0 15px; 
        }

        /* Top Bar with Navigation */
        .top-navigation { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px; 
        }
        
        .back-home-link {
            background: var(--white); 
            color: var(--primary-blue); 
            border: 2px solid var(--primary-blue);
            padding: 9px 16px; 
            border-radius: 10px; 
            font-size: 13.5px; 
            font-weight: 600;
            text-decoration: none; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); 
            transition: all 0.2s;
        }
        
        .back-home-link:hover { 
            background: var(--primary-blue); 
            color: var(--white); 
        }

        /* Header Layout */
        .form-header { 
            text-align: center; 
            margin-bottom: 30px; 
        }
        
        .form-header .badge {
            background: rgba(0, 45, 114, 0.08); 
            color: var(--primary-blue);
            padding: 6px 14px; 
            border-radius: 30px; 
            font-size: 11px; 
            font-weight: 700;
            letter-spacing: 1px; 
            text-transform: uppercase; 
            display: inline-block; 
            margin-bottom: 10px;
        }
        
        .form-header h2 { 
            font-size: 26px; 
            font-weight: 800; 
            color: var(--primary-blue); 
        }
        
        .form-header p { 
            color: var(--text-muted); 
            font-size: 13.5px; 
            margin-top: 4px; 
        }

        /* Registration Form Main Card */
        .admission-card {
            background: var(--white); 
            border-radius: 20px; 
            padding: 35px;
            box-shadow: var(--shadow-lg); 
            border: 1px solid #e2e8f0;
        }

        /* Section Segments inside Form */
        .section-title {
            font-size: 15px;
            color: var(--primary-blue);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 18px;
            padding-bottom: 6px;
            border-bottom: 2px solid #f1f5f9;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            margin-bottom: 28px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .form-group.full-width {
            grid-column: span 2;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
        }
        
        .form-group label span {
            color: red;
        }

        .form-group input, 
        .form-group select, 
        .form-group textarea {
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 14.5px;
            font-weight: 500;
            outline: none;
            color: var(--text-dark);
            transition: border-color 0.2s;
            background: #fafafa;
        }

        .form-group input:focus, 
        .form-group select:focus, 
        .form-group textarea:focus {
            border-color: var(--accent-blue);
            background: var(--white);
        }

        .form-group textarea {
            resize: none;
            height: 80px;
        }

        /* Action Buttons */
        .submit-btn {
            background: #25d366; /* WhatsApp Classic Green Theme */
            color: var(--white);
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 16px -4px rgba(37, 211, 102, 0.3);
            transition: all 0.2s;
        }

        .submit-btn:hover {
            background: #20ba5a;
            transform: translateY(-1px);
            box-shadow: 0 12px 20px -4px rgba(37, 211, 102, 0.4);
        }

        /* --- MOBILE OPTIMIZATION SYSTEM --- */
        @media (max-width: 768px) {
            .container { 
                margin: 20px auto; 
                padding: 0 10px; 
            }
            
            .form-header h2 { 
                font-size: 21px; 
            }
            
            .admission-card { 
                padding: 22px 16px; 
                border-radius: 16px; 
            }
            
            .form-grid { 
                grid-template-columns: 1fr; 
                gap: 14px; 
                margin-bottom: 20px; 
            }
            
            .form-group.full-width { 
                grid-column: span 1; 
            }
            
            .submit-btn { 
                font-size: 15px; 
                padding: 14px; 
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Top Navigation Area -->
        <div class="top-navigation">
            <a href="index.html" class="back-home-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
            <span style="font-size: 12px; font-weight:600; color:var(--text-muted);">Session: 2026-2027</span>
        </div>

        <!-- Header Module -->
        <div class="form-header">
            <span class="badge">Registration Open</span>
            <h2>Student Admission Form</h2>
            <p>Kindly fill the official details accurately to submit your admission application.</p>
        </div>

        <!-- Main Registration Form -->
        <div class="admission-card">
            <form id="whatsappAdmissionForm" onsubmit="sendAdmissionData(event)">
                
                <!-- SECTION 1: Student Information -->
                <div class="section-title"><i class="fa-solid fa-user-graduate"></i> Student Details</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Student Full Name <span>*</span></label>
                        <input type="text" id="applicantName" placeholder="Enter student's name" required>
                    </div>
                    <div class="form-group">
                        <label>Select Target Class <span>*</span></label>
                        <select id="targetClass" required>
                            <option value="" disabled selected>Choose a Class</option>
                            <option value="Playgroup / Nursery">Playgroup / Nursery</option>
                            <option value="KG / Prep">KG / Prep</option>
                            <option value="Class 1">Class 1</option>
                            <option value="Class 2">Class 2</option>
                            <option value="Class 3">Class 3</option>
                            <option value="Class 4">Class 4</option>
                            <option value="Class 5">Class 5</option>
                            <option value="Class 6">Class 6</option>
                            <option value="Class 7">Class 7</option>
                            <option value="Class 8">Class 8</option>
                            <option value="Class 9 (Science)">Class 9 (Science)</option>
                            <option value="Class 10 (Science)">Class 10 (Science)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Date of Birth <span>*</span></label>
                        <input type="date" id="studentDob" required>
                    </div>
                    <div class="form-group">
                        <label>Gender <span>*</span></label>
                        <select id="studentGender" required>
                            <option value="" disabled selected>Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                </div>

                <!-- SECTION 2: Parents Information -->
                <div class="section-title"><i class="fa-solid fa-users"></i> Parents / Guardian Details</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Father's Name <span>*</span></label>
                        <input type="text" id="fatherName" placeholder="Enter father's name" required>
                    </div>
                    <div class="form-group">
                        <label>Father's Occupation</label>
                        <input type="text" id="fatherJob" placeholder="e.g. Business / Job">
                    </div>
                    <div class="form-group">
                        <label>Active WhatsApp Number <span>*</span></label>
                        <input type="tel" id="parentPhone" placeholder="e.g. 03XXXXXXXXX" required>
                    </div>
                    <div class="form-group">
                        <label>Alternative Contact No</label>
                        <input type="tel" id="altPhone" placeholder="Optional contact number">
                    </div>
                    <div class="form-group full-width">
                        <label>Residential Address <span>*</span></label>
                        <textarea id="homeAddress" placeholder="Type your complete current home address here..." required></textarea>
                    </div>
                </div>

                <!-- SECTION 3: Academic History (Optional) -->
                <div class="section-title"><i class="fa-solid fa-school-flag"></i> Previous School Details</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Last School Attended</label>
                        <input type="text" id="prevSchool" placeholder="Previous school name (if any)">
                    </div>
                    <div class="form-group">
                        <label>Previous Grade/Class</label>
                        <input type="text" id="prevClass" placeholder="e.g. Passed Class 4">
                    </div>
                </div>

                <!-- Submit Button Layout -->
                <button type="submit" class="submit-btn">
                    <i class="fa-brands fa-whatsapp"></i> Submit Admission Now via WhatsApp
                </button>

            </form>
        </div>

    </div>

    <!-- WhatsApp Redirect Script Logical Engine -->
    <script>
        function sendAdmissionData(event) {
            event.preventDefault(); // Default Page reload stopping feature

            // Target Admin WhatsApp Config setup
            const targetWhatsAppNumber = "923462053510"; // International standard format for 0346-2053510

            // Pulling data variables safely from input forms
            const studentName = document.getElementById('applicantName').value.trim();
            const chosenClass = document.getElementById('targetClass').value;
            const dob = document.getElementById('studentDob').value;
            const gender = document.getElementById('studentGender').value;
            
            const fatherName = document.getElementById('fatherName').value.trim();
            const fatherJob = document.getElementById('fatherJob').value.trim() || "Not Mentioned";
            const phone = document.getElementById('parentPhone').value.trim();
            const altPhone = document.getElementById('altPhone').value.trim() || "None";
            const address = document.getElementById('homeAddress').value.trim();
            
            const lastSchool = document.getElementById('prevSchool').value.trim() || "Fresh Admission";
            const lastClass = document.getElementById('prevClass').value.trim() || "N/A";

            // Crafting high-fidelity, polished text structure for professional layout
            let dynamicMessage = `*✨ PINE HILLS SCHOOL - NEW ONLINE ADMISSION APPLICATION ✨*\n\n`;
            dynamicMessage += `*👤 STUDENT DETAILS:*\n`;
            dynamicMessage += `▪️ *Name:* ${studentName}\n`;
            dynamicMessage += `▪️ *Class Applied:* ${chosenClass}\n`;
            dynamicMessage += `▪️ *Date of Birth:* ${dob}\n`;
            dynamicMessage += `▪️ *Gender:* ${gender}\n\n`;
            
            dynamicMessage += `*👨‍👩‍👦 PARENT / GUARDIAN DETAILS:*\n`;
            dynamicMessage += `▪️ *Father Name:* ${fatherName}\n`;
            dynamicMessage += `▪️ *Father Occupation:* ${fatherJob}\n`;
            dynamicMessage += `▪️ *WhatsApp No:* ${phone}\n`;
            dynamicMessage += `▪️ *Alternative No:* ${altPhone}\n`;
            dynamicMessage += `▪️ *Home Address:* ${address}\n\n`;
            
            dynamicMessage += `*🏫 ACADEMIC HISTORY:*\n`;
            dynamicMessage += `▪️ *Previous School:* ${lastSchool}\n`;
            dynamicMessage += `▪️ *Last Class:* ${lastClass}\n\n`;
            dynamicMessage += `_Submitted via Pine Hills School Independent Validation Network_`;

            // Encoding string characters for seamless browser delivery
            const encodedTextString = encodeURIComponent(dynamicMessage);
            
            // Constructing WhatsApp Dynamic Link
            const finalWhatsAppUrl = `https://api.whatsapp.com/send?phone=${targetWhatsAppNumber}&text=${encodedTextString}`;

            // Launching the WhatsApp Engine API
            window.open(finalWhatsAppUrl, '_blank');
        }
    </script>
</body>
</html>
