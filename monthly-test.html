<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Test Results - Pine Hills School</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.getfonts.net/style/jameel-noori-nastaleeq" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Core Firebase SDKs (v9 Compatible Compatibility Layer) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary-blue: #002d72;
            --accent-blue: #1d4ed8;
            --light-blue: #f4f7fc;
            --text-dark: #0f172a;
            --text-muted: #475569;
            --white: #ffffff;
            --success-green: #10b981;
            --danger-red: #ef4444;
            --shadow-sm: 0 2px 8px rgba(0, 45, 114, 0.04);
            --shadow-md: 0 10px 30px rgba(0, 45, 114, 0.06);
            --shadow-lg: 0 20px 40px rgba(0, 45, 114, 0.1);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #fafbfc; color: var(--text-dark); -webkit-font-smoothing: antialiased; padding-bottom: 40px; }

        header { width: 100%; background: #ffffff; box-shadow: var(--shadow-sm); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0, 45, 114, 0.05); }
        .nav-container { max-width: 1280px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; }
        .logo-area { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-img { width: 45px; height: 45px; object-fit: contain; border-radius: 50%; }
        .logo-text h1 { font-size: 18px; font-weight: 700; color: var(--primary-blue); line-height: 1; }
        .logo-text span { font-size: 11px; font-weight: 600; color: var(--primary-blue); letter-spacing: 2px; display: block; }
        .nav-links { display: flex; list-style: none; gap: 20px; }
        .nav-links a { text-decoration: none; color: var(--text-muted); font-weight: 500; font-size: 14px; transition: var(--transition); }
        .nav-links a:hover, .nav-links a.active { color: var(--primary-blue); }
        .menu-toggle { display: none; font-size: 20px; color: var(--primary-blue); background: none; border: none; cursor: pointer; }

        .wrapper { max-width: 800px; margin: 25px auto; padding: 0 15px; }
        .back-btn { display: inline-flex; align-items: center; gap: 6px; color: var(--primary-blue); text-decoration: none; font-weight: 600; margin-bottom: 20px; font-size: 14px; }
        .page-header { text-align: center; margin-bottom: 25px; }
        .page-header h2 { font-size: 24px; color: var(--primary-blue); font-weight: 700; }
        .page-header p { color: var(--text-muted); font-size: 13px; }

        .search-box-card { background: var(--white); border-radius: 12px; padding: 20px; box-shadow: var(--shadow-md); border: 1px solid rgba(0, 45, 114, 0.03); margin-bottom: 25px; text-align: center; }
        .search-group { display: flex; gap: 10px; max-width: 500px; margin: 15px auto 0 auto; }
        .roll-input { flex: 1; padding: 12px 15px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; }
        .roll-input:focus { border-color: var(--primary-blue); }
        .search-btn { background-color: var(--primary-blue); color: var(--white); border: none; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
        .search-btn:hover { background-color: var(--accent-blue); }

        .print-control-bar { display: none; justify-content: flex-end; margin-bottom: 15px; }
        .print-action-btn { background-color: #0f172a; color: var(--white); border: none; padding: 10px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }

        #printArea { display: flex; flex-direction: column; gap: 30px; }

        .marksheet-container { background: var(--white); border-radius: 16px; padding: 25px; box-shadow: var(--shadow-lg); border: 1px solid #cbd5e1; display: none; position: relative; box-sizing: border-box; }
        .marksheet-container::before { content: ''; position: absolute; top: 6px; left: 6px; right: 6px; bottom: 6px; border: 1px solid rgba(0, 45, 114, 0.1); border-radius: 12px; pointer-events: none; }
        
        .sheet-header { display: flex; align-items: center; justify-content: space-between; border-bottom: 3px double var(--primary-blue); padding-bottom: 15px; margin-bottom: 20px; }
        .sheet-logo-area { display: flex; align-items: center; gap: 10px; }
        .sheet-school-logo { width: 50px; height: 50px; border-radius: 50%; object-fit: contain; }
        .school-info h3 { font-size: 18px; color: var(--primary-blue); font-weight: 700; }
        .school-info p { font-size: 11px; color: var(--text-muted); }
        .report-badge { background-color: var(--light-blue); color: var(--primary-blue); padding: 6px 12px; border-radius: 6px; font-weight: 700; font-size: 11px; border: 1px dashed var(--primary-blue); }

        .student-bio-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; }
        
        .bio-item { font-size: 13px; color: #111111; font-weight: 550; }
        .bio-item strong { color: var(--text-dark); font-weight: 600; }

        .table-responsive-wrapper { width: 100%; margin-bottom: 20px; border-radius: 8px; overflow: hidden; border: 1px solid #e2e8f0; }
        .marks-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13.5px; }
        
        .marks-table th { 
            background-color: var(--white); 
            color: var(--primary-blue); 
            padding: 14px 15px; 
            font-weight: 700; 
            font-size: 15px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--primary-blue);
        }
        
        .marks-table td { padding: 10px 15px; border-bottom: 1px solid #e2e8f0; color: var(--text-dark); }
        .marks-table tr:nth-child(even) { background-color: #f8fafc; }

        .sheet-footer { display: flex; justify-content: space-between; align-items: center; background-color: var(--light-blue); padding: 15px; border-radius: 10px; border-left: 5px solid var(--primary-blue); margin-bottom: 20px; gap: 15px; }
        .metrics-block { display: flex; gap: 25px; flex-wrap: wrap; }
        
        .metric-box { font-size: 12px; color: var(--primary-blue); min-width: 100px; }
        .metric-box span { font-weight: 700; color: var(--primary-blue); font-size: 15px; display: block; margin-top: 2px; }
        
        .status-pill { padding: 6px 16px; border-radius: 20px; font-weight: 700; font-size: 13px; text-transform: uppercase; text-align: center; }
        .pass { background-color: #dcfce7; color: var(--success-green); }
        .fail { background-color: #fee2e2; color: var(--danger-red); }

        .marksheet-note { background: #fffbeb; border: 1px dashed #f59e0b; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 25px; }
        .marksheet-note p { font-family: 'Jameel Noori Nastaleeq', 'Urdu Typesetting', serif; font-size: 20px; color: #b45309; direction: rtl; line-height: 1.5; }

        .signature-row { display: flex; justify-content: space-between; margin-top: 35px; gap: 20px; }
        .sig-box { text-align: center; width: 140px; }
        .sig-line { border-top: 1px dashed #cbd5e1; margin-bottom: 4px; }
        .sig-box p { font-size: 11px; color: var(--text-muted); }

        .error-message { text-align: center; background: var(--white); border-radius: 12px; padding: 25px; box-shadow: var(--shadow-md); color: var(--text-muted); display: none; }
        .error-message i { font-size: 35px; color: var(--danger-red); margin-bottom: 8px; }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .nav-links { position: fixed; top: 70px; left: -100%; width: 100%; height: calc(100vh - 70px); background-color: var(--white); flex-direction: column; align-items: center; padding-top: 30px; gap: 25px; transition: var(--transition); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
            .nav-links.active { left: 0; }
            
            .search-group { flex-direction: column; gap: 8px; }
            .search-btn { width: 100%; justify-content: center; }
            
            .marksheet-container { padding: 15px 10px; }
            .sheet-header { flex-direction: column; text-align: center; gap: 10px; }
            .student-bio-grid { grid-template-columns: 1fr; padding: 10px; gap: 6px; }
            
            .sheet-footer { flex-direction: column; text-align: center; align-items: center; padding: 15px 10px; }
            .metrics-block { justify-content: center; gap: 15px; width: 100%; }
            .metric-box { text-align: center; min-width: 30%; }
            .status-pill { width: 100%; max-width: 200px; margin-top: 5px; }
            
            .signature-row { justify-content: space-between; width: 100%; }
            .sig-box { width: 45%; }
        }

        @media print {
            header, .back-btn, .page-header, .search-box-card, .print-control-bar { display: none !important; }
            .wrapper { width: 100% !important; max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
            .marksheet-container { display: block !important; box-shadow: none !important; border: 1px solid #000 !important; padding: 15mm !important; background: #fff !important; page-break-after: always !important; }
            .marks-table th { background-color: var(--white) !important; color: var(--primary-blue) !important; border-bottom: 2px solid #000 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo-area">
                <img src="real logo copy.jpg" alt="Pine Hills Logo" class="logo-img">
                <div class="logo-text">
                    <h1>PINE HILLS</h1>
                    <span>SCHOOL</span>
                </div>
            </a>
            <nav>
                <ul class="nav-links" id="menuLinks">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="activity.html">Activities</a></li>
                    <li><a href="monthly-test.html" class="active">Academics</a></li>
                    <li><a href="#">Contact Us</a></li>
                </ul>
                <button class="menu-toggle" id="menuBtn"><i class="fa-solid fa-bars"></i></button>
            </nav>
        </div>
    </header>

    <div class="wrapper">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>

        <div class="page-header">
            <h2>Monthly Test Result Portal</h2>
            <p>Enter Student Roll Number to view progress report card.</p>
        </div>

        <div class="search-box-card">
            <h4 style="color: var(--primary-blue); font-weight: 600; font-size: 14px;">Enter Simple Roll Number</h4>
            <div class="search-group">
                <input type="text" id="rollNumberInput" class="roll-input" placeholder="Enter number (e.g., 101, 102)...">
                <button class="search-btn" onclick="generateReport()"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
            </div>
        </div>

        <div class="print-control-bar" id="printControlBar">
            <button class="print-action-btn" onclick="window.print()"><i class="fa-solid fa-print"></i> Print Marksheet</button>
        </div>

        <div id="printArea">
            <!-- Marksheet generated dynamically here -->
        </div>

        <div class="error-message" id="errorMessage">
            <i class="fa-regular fa-circle-xmark"></i>
            <h3 id="errorTitle">Roll Number Nahi Mila</h3>
            <p id="errorDesc">Meharbani kar ke sahi number enter karein.</p>
        </div>
    </div>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const menuLinks = document.getElementById('menuLinks');
        menuBtn.addEventListener('click', () => { menuLinks.classList.toggle('active'); });
        
        // 1. YOUR FIREBASE CONFIGURATION
        const firebaseConfig = {
          apiKey: "AIzaSyDATM3pz-eauXtxt6t3V_shp-WBhuTuovI",
          authDomain: "pine-hills-school.firebaseapp.com",
          projectId: "pine-hills-school",
          storageBucket: "pine-hills-school.firebasestorage.app",
          messagingSenderId: "310029732655",
          appId: "1:310029732655:web:37edd331495239524cefda",
          databaseURL: "https://pine-hills-school-default-rtdb.firebaseio.com" // Realtime Database URL
        };

        // Initialize Firebase with Compatibility Libraries
        // Note: Make sure to include the Realtime Database compat script in your <head> if needed, 
        // but the core app package handles it via firebase.database()
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        // Dynamic loading wrapper for database script if not already present
        if (!firebase.database) {
            const script = document.createElement('script');
            script.src = "https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js";
            document.head.appendChild(script);
        }

        function calculateFallbackGrade(pct) {
            if (isNaN(pct) || pct <= 0) return "Absent";
            if (pct >= 90) return "A1";
            if (pct >= 80) return "A";
            if (pct >= 70) return "B";
            if (pct >= 60) return "C";
            if (pct >= 50) return "D";
            if (pct >= 33) return "E";
            return "F";
        }

        function createMarksheetHTML(rollNum, record) {
            let calculatedTotalMarks = 0;
            let calculatedObtainedMarks = 0;
            let totalMarksValid = true;

            const subjectsList = record.subjects || [];

            subjectsList.forEach(sub => {
                let t = parseInt(sub.total);
                let o = parseInt(sub.obtained);

                if (!isNaN(t)) calculatedTotalMarks += t;
                else totalMarksValid = false; 
                
                if (!isNaN(o)) calculatedObtainedMarks += o;
            });

            const totMarks = totalMarksValid && calculatedTotalMarks > 0 ? calculatedTotalMarks : (parseInt(record.totalMarks) || 0);
            const obtMarks = calculatedObtainedMarks > 0 ? calculatedObtainedMarks : (parseInt(record.totalObtained) || 0);

            let finalPercentageStr = "-";
            let numericPercentage = 0;
            
            if (totMarks > 0) {
                numericPercentage = (obtMarks / totMarks) * 100;
                finalPercentageStr = numericPercentage.toFixed(2) + "%";
            } else if (record.percentage && record.percentage !== "-") {
                numericPercentage = parseFloat(record.percentage);
                finalPercentageStr = isNaN(numericPercentage) ? record.percentage : numericPercentage.toFixed(2) + "%";
            }

            let finalGrade = record.grade;
            if (!finalGrade || finalGrade === "FALSE" || !isNaN(finalGrade)) {
                finalGrade = calculateFallbackGrade(numericPercentage);
            }
            if (obtMarks === 0 && finalGrade !== "Absent" && subjectsList.length > 0 && subjectsList[0].obtained === "A") {
                finalGrade = "Absent";
            }

            const currentStatus = record.status || "PASS";
            const statusClass = (currentStatus.toUpperCase() === "PASS" || currentStatus.toUpperCase() === "PASSED") ? "status-pill pass" : "status-pill fail";

            let subjectsRows = '';
            if(subjectsList.length === 0) {
                subjectsRows = `<tr><td colspan="3" style="text-align:center; color:var(--danger-red); font-weight:600; padding:20px;">All Examination Subjects Absent</td></tr>`;
            } else {
                subjectsList.forEach(sub => {
                    subjectsRows += `
                        <tr>
                            <td style="font-weight: 500; color: var(--primary-blue);">${sub.name}</td>
                            <td style="font-weight: 600; text-align: center; color: var(--text-muted); font-size: 14px;">${sub.total || "-"}</td>
                            <td style="font-weight: 700; text-align: right; font-size: 14px; color: ${sub.obtained === 'A' ? 'var(--danger-red)' : 'var(--text-dark)'};">${sub.obtained}</td>
                        </tr>
                    `;
                });
            }

            return `
                <div class="marksheet-container" style="display: block; margin-bottom: 30px;">
                    <div class="sheet-header">
                        <div class="sheet-logo-area">
                            <img src="real logo copy.jpg" alt="Pine Hills School" class="sheet-school-logo">
                            <div class="school-info">
                                <h3>PINE HILLS SCHOOL</h3>
                                <p>Karachi, Pakistan | Progress Report</p>
                            </div>
                        </div>
                        <div class="report-badge">Monthly Test</div>
                    </div>

                    <div class="student-bio-grid">
                        <div class="bio-item">Student Name: <strong>${record.name.toUpperCase()}</strong></div>
                        <div class="bio-item">Roll Number: <strong>${rollNum.toUpperCase()}</strong></div>
                        <div class="bio-item">Class / Section: <strong>${(record.class || '').toUpperCase()}</strong></div>
                        <div class="bio-item">Examination Month: <strong>${record.month || 'June 2026 (MONTHLY TEST)'}</strong></div>
                    </div>

                    <div class="table-responsive-wrapper">
                        <table class="marks-table">
                            <thead>
                                <tr>
                                    <th>Subject Name</th>
                                    <th style="text-align: center;">Total Marks</th>
                                    <th style="text-align: right;">Obtained Marks</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${subjectsRows}
                            </tbody>
                        </table>
                    </div>

                    <div class="sheet-footer">
                        <div class="metrics-block">
                            <div class="metric-box">Marks Obtained <span>${obtMarks} / ${totMarks}</span></div>
                            <div class="metric-box">Percentage <span>${finalPercentageStr}</span></div>
                            <div class="metric-box">Grade <span>${finalGrade}</span></div>
                        </div>
                        <div class="${statusClass}">${currentStatus}</div>
                    </div>

                    <div class="marksheet-note">
                        <p>مزید معلومات کے لیے ہماری ویب سائٹ یوز کریں۔</p>
                    </div>

                    <div class="signature-row">
                        <div class="sig-box">
                            <div class="sig-line"></div>
                            <p>Class Teacher</p>
                        </div>
                        <div class="sig-box">
                            <div class="sig-line"></div>
                            <p>Principal</p>
                        </div>
                    </div>
                </div>
            `;
        }

        // 3. Real-time Firebase Realtime Database query execution
        async function generateReport() {
            const inputVal = document.getElementById('rollNumberInput').value.trim().toLowerCase();
            const printArea = document.getElementById('printArea');
            const printBar = document.getElementById('printControlBar');
            const errorBlock = document.getElementById('errorMessage');
            const errorTitle = document.getElementById('errorTitle');
            const errorDesc = document.getElementById('errorDesc');

            // Reset States
            printArea.innerHTML = '';
            printBar.style.display = 'none';
            errorBlock.style.display = 'none';

            if(inputVal === "") {
                errorTitle.innerText = "Roll Number Khaali Hai";
                errorDesc.innerText = "Meharbani kar ke check kr ke number enter karein.";
                errorBlock.style.display = 'block';
                return;
            }

            // Ensure database script is completely loaded
            if (typeof firebase.database !== 'function') {
                setTimeout(generateReport, 200);
                return;
            }

            const dbRef = firebase.database().ref('reportDatabase');

            // Print All Logic
            if(inputVal === "print-all") {
                try {
                    const snapshot = await dbRef.once('value');
                    if(!snapshot.exists()) {
                        errorTitle.innerText = "Database Khaali Hai";
                        errorDesc.innerText = "Filhal Database mein koi data saved nahi mila.";
                        errorBlock.style.display = 'block';
                        return;
                    }

                    let masterHTML = '';
                    snapshot.forEach(childSnapshot => {
                        masterHTML += createMarksheetHTML(childSnapshot.key, childSnapshot.val());
                    });

                    printArea.innerHTML = masterHTML;
                    printBar.style.display = 'flex';
                    
                    setTimeout(() => { window.print(); }, 600);
                } catch (err) {
                    console.error("Firebase fetch error:", err);
                    errorTitle.innerText = "Server Error";
                    errorDesc.innerText = "Data load nahi ho saka, internet connection check karein.";
                    errorBlock.style.display = 'block';
                }
                return;
            }

            // Fetch single document dynamically from node
            try {
                const snapshot = await dbRef.child(inputVal).once('value');

                if (snapshot.exists()) {
                    printArea.innerHTML = createMarksheetHTML(inputVal, snapshot.val());
                    printBar.style.display = 'flex';
                } else {
                    errorTitle.innerText = "Roll Number Nahi Mila";
                    errorDesc.innerText = "Database mein ye roll number register nahi hai.";
                    errorBlock.style.display = 'block';
                }
            } catch (err) {
                console.error("Firebase transaction error:", err);
                errorTitle.innerText = "Connection Failed";
                errorDesc.innerText = "Firebase se data fetch krny mein rukawat aai.";
                errorBlock.style.display = 'block';
            }
        }
    </script>
</body>
</html>
