<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Activities - Pine Hills School</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: #f9f9f9; color: #030303; padding-top: 70px; padding-bottom: 30px; }

        /* --- YOUTUBE HEADER --- */
        header {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 60px;
            background: #fff; display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; box-shadow: 0 1px 5px rgba(0,0,0,0.1); z-index: 1000;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .back-btn { color: #030303; font-size: 20px; text-decoration: none; }
        .logo-text { font-size: 18px; font-weight: 700; color: #ff0000; letter-spacing: -0.5px; }
        .logo-text span { color: #030303; }

        .search-container { position: relative; flex-grow: 1; max-width: 400px; margin: 0 10px; }
        .search-input { width: 100%; padding: 8px 12px 8px 38px; border: 1px solid #ccc; border-radius: 20px; font-size: 14px; outline: none; background: #f8f8f8; }
        .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #606060; }

        /* --- MAIN CONTAINER --- */
        .container { width: 100%; max-width: 800px; margin: 0 auto; padding: 0 12px; }
        .section-title { font-size: 16px; font-weight: 700; margin: 20px 0 10px 0; display: flex; align-items: center; gap: 8px; }
        .section-title i { color: #ff0000; }

        /* --- SHORTS HORIZONTAL LIST --- */
        .shorts-wrapper { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .shorts-wrapper::-webkit-scrollbar { display: none; }
        
        .short-card {
            flex: 0 0 140px; aspect-ratio: 9/16; background: #000; border-radius: 12px;
            position: relative; overflow: hidden; cursor: pointer;
        }
        .short-card video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; background: #000; }
        .short-info {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 8px; background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: #fff; font-size: 11px; font-weight: 500;
        }

        /* --- LONG VIDEOS FEED --- */
        .video-feed { display: flex; flex-direction: column; gap: 24px; margin-top: 10px; }
        .youtube-card { background: #fff; border-radius: 0; overflow: hidden; display: flex; flex-direction: column; }
        
        .video-player-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
        .video-player-container video { width: 100%; height: 100%; object-fit: contain; }
        
        .video-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer;
        }
        .video-overlay i { font-size: 55px; color: rgba(255, 255, 255, 0.9); text-shadow: 0px 4px 10px rgba(0,0,0,0.5); }
        .video-overlay.hidden { display: none; }

        /* RED YOUTUBE LOADER SPIN */
        .loading-spinner {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2);
            border-left-color: #ff0000; border-radius: 50%; animation: spin 0.8s linear infinite;
            display: none; z-index: 9;
        }
        @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        .video-details { padding: 12px 4px; display: flex; gap: 12px; }
        .channel-avatar { width: 36px; height: 36px; background: #e2e8f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #475569; font-size: 14px; flex-shrink: 0; }
        .video-text { flex-grow: 1; }
        .video-title { font-size: 14px; font-weight: 500; line-height: 1.4; color: #0f0f0f; margin-bottom: 4px; }
        .video-meta { font-size: 12px; color: #606060; }

        .video-actions { display: flex; gap: 15px; margin-top: 10px; padding-left: 48px; border-bottom: 1px solid #e5e5e5; padding-bottom: 12px; }
        .action-btn { background: #f2f2f2; border: none; padding: 6px 12px; border-radius: 16px; font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .action-btn.liked i { color: #ff0000; }

        .comments-section { padding: 10px 0 10px 48px; background: #fdfdfd; display: none; }
        .comment-input-group { display: flex; gap: 8px; margin-bottom: 10px; }
        .comment-input-group input { flex-grow: 1; padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; outline: none; }
        .comment-btn { background: #065fd4; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; }
        .comments-list-box { display: flex; flex-direction: column; gap: 8px; max-height: 150px; overflow-y: auto; font-size: 12px; }
        .single-comment { background: #f2f2f2; padding: 6px 10px; border-radius: 6px; }
        .comment-author { font-weight: 700; color: #0f0f0f; margin-bottom: 2px; }

        .no-results { text-align: center; padding: 40px; color: #606060; display: none; }

        /* Shorts Screen */
        .shorts-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: #000; z-index: 2000; display: none;
            overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none;
        }
        .shorts-modal::-webkit-scrollbar { display: none; }

        .shorts-close-btn {
            position: fixed; top: 20px; left: 20px; color: #fff;
            font-size: 24px; z-index: 2100; cursor: pointer; background: rgba(0,0,0,0.5);
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%;
        }

        .fullscreen-short-container {
            width: 100%; height: 100vh; scroll-snap-align: start;
            position: relative; display: flex; align-items: center; justify-content: center; background: #000;
        }
        .fullscreen-short-container video { width: 100%; height: 100%; object-fit: cover; }

        .shorts-overlay-data {
            position: absolute; bottom: 30px; left: 16px; color: #fff; z-index: 2050;
            max-width: 75%; text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }
        .shorts-overlay-data h3 { font-size: 16px; margin-bottom: 5px; font-weight: 700; }
        .shorts-overlay-data p { font-size: 13px; opacity: 0.9; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <div class="logo-text">PineHills<span>Tube</span></div>
        </div>
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="studentSearch" class="search-input" placeholder="Search student name..." onkeyup="searchVideos()">
        </div>
    </header>

    <div class="container">
        <div id="shortsSectionTitle" class="section-title"><i class="fa-solid fa-bolt"></i> Activity Shorts</div>
        <div class="shorts-wrapper" id="shortsContainer"></div>

        <div id="longSectionTitle" class="section-title"><i class="fa-regular fa-play-circle"></i> Activity Videos</div>
        <div class="video-feed" id="longVideosContainer">
            <div class="no-results" id="noResults"><h3>Koi record nahi mila</h3></div>
        </div>
    </div>

    <div class="shorts-modal" id="shortsModal">
        <div class="shorts-close-btn" onclick="closeShortsModal()"><i class="fa-solid fa-xmark"></i></div>
        <div id="modalShortsFeed"></div>
    </div>

    <!-- FIREBASE MODULE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDATM3pz-eauXtxt6t3V_shp-WBhuTuovI",
            authDomain: "pine-hills-school.firebaseapp.com",
            databaseURL: "https://pine-hills-school-default-rtdb.firebaseio.com",
            projectId: "pine-hills-school",
            storageBucket: "pine-hills-school.firebasestorage.app",
            messagingSenderId: "310029732655",
            appId: "1:310029732655:web:37edd331495239524cefda"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db; window.updateDoc = updateDoc; window.doc = doc;
        window.globalComments = {}; window.allShortsData = []; 
        
        let initialLoadDone = false;
        const q = query(collection(db, "activities"), orderBy("timestamp", "desc"));

        onSnapshot(q, (snapshot) => {
            const shortsContainer = document.getElementById('shortsContainer');
            const longContainer = document.getElementById('longVideosContainer');
            const noResultsHTML = document.getElementById('noResults').outerHTML;

            if (initialLoadDone) return; 

            shortsContainer.innerHTML = '';
            longContainer.innerHTML = noResultsHTML;
            window.allShortsData = [];

            if(snapshot.empty) {
                document.getElementById('noResults').style.display = 'block';
                return;
            }

            let indexCount = 0;

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const id = docSnap.id;
                window.globalComments[id] = data.comments || [];

                const userLikes = JSON.parse(localStorage.getItem('yt_liked') || '{}');
                const isLiked = userLikes[id] ? 'liked' : '';
                const isShortVideo = data.videoUrl.includes("short") || (data.studentNames && data.studentNames.toLowerCase().includes("short"));

                if(isShortVideo) {
                    window.allShortsData.push({ id, ...data });
                    const shortIndex = window.allShortsData.length - 1;
                    const shortHTML = `
                        <div class="short-card" data-name="${data.studentNames ? data.studentNames.toLowerCase() : ''}" onclick="openShortsModal(${shortIndex})">
                            <video data-src="${data.videoUrl}" preload="none" muted loop playsinline></video>
                            <div class="short-info"><div>${data.studentNames || 'Student'}</div></div>
                        </div>
                    `;
                    shortsContainer.insertAdjacentHTML('beforeend', shortHTML);
                } else {
                    indexCount++;
                    const firstLetter = data.studentNames ? data.studentNames.charAt(0).toUpperCase() : 'P';
                    const showOverlay = indexCount === 1 ? '' : 'hidden';

                    const longHTML = `
                        <div class="youtube-card" id="card-${id}" data-name="${data.studentNames ? data.studentNames.toLowerCase() : ''}">
                            <div class="video-player-container">
                                <div class="loading-spinner" id="spinner-${id}"></div>
                                <div class="video-overlay ${showOverlay}" id="overlay-${id}" onclick="startFirstVideo('${id}')"><i class="fa-solid fa-circle-play"></i></div>
                                <video id="vid-${id}" class="feed-video" data-src="${data.videoUrl}" controls preload="none" playsinline crossorigin="anonymous" 
                                    onplay="pauseOtherVideos(this)"
                                    onwaiting="document.getElementById('spinner-${id}').style.display='block';"
                                    onplaying="document.getElementById('spinner-${id}').style.display='none';">
                                </video>
                            </div>
                            <div class="video-details">
                                <div class="channel-avatar">${firstLetter}</div>
                                <div class="video-text">
                                    <div class="video-title">${data.studentNames || 'Student Performance'}</div>
                                    <div class="video-meta">${data.classSection || 'All Classes'} • Pine Hills School</div>
                                </div>
                            </div>
                            <div class="video-actions">
                                <button class="action-btn ${isLiked}" onclick="handleLike(this, '${id}')"><i class="fa-solid fa-thumbs-up"></i> <span>${data.likes || 0}</span></button>
                                <button class="action-btn" onclick="toggleCommentsBox('${id}')"><i class="fa-solid fa-message"></i> <span class="cmt-btn-txt-${id}">Comments (${window.globalComments[id].length})</span></button>
                                <button class="action-btn" onclick="shareVideo('${data.studentNames || ''}')"><i class="fa-solid fa-share"></i> <span>Share</span></button>
                            </div>
                            <div class="comments-section" id="comments-box-${id}">
                                <div class="comment-input-group">
                                    <input type="text" id="name-input-${id}" placeholder="Name..."><input type="text" id="text-input-${id}" placeholder="Write comment..."><button class="comment-btn" onclick="postComment('${id}')">Post</button>
                                </div>
                                <div class="comments-list-box" id="comments-list-${id}">
                                    ${window.globalComments[id].map(c => `<div class="single-comment"><div class="comment-author">${c.name}</div><div>${c.text}</div></div>`).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                    longContainer.insertAdjacentHTML('beforeend', longHTML);
                }
            });

            initialLoadDone = true;
            initScrollAutoplay(); 
        });
    </script>

    <!-- AUTOMATIC LAZY-STREAM ENGINE -->
    <script>
        let hasUserActivated = false;
        let shortsObserver;

        function openShortsModal(startIndex) {
            document.querySelectorAll('.feed-video').forEach(v => { v.pause(); });

            const modal = document.getElementById('shortsModal');
            const feed = document.getElementById('modalShortsFeed');
            feed.innerHTML = ''; 

            window.allShortsData.forEach((short, idx) => {
                const fullscreenShortHTML = `
                    <div class="fullscreen-short-container" id="short-block-${idx}">
                        <div class="loading-spinner" id="short-spin-${idx}" style="display:block;"></div>
                        <video class="shorts-fullscreen-video" data-src="${short.videoUrl}" preload="none" loop playsinline volume="1"
                            onplaying="document.getElementById('short-spin-${idx}').style.display='none';"
                            onwaiting="document.getElementById('short-spin-${idx}').style.display='block';">
                        </video>
                        <div class="shorts-overlay-data">
                            <h3>@ ${short.studentNames || 'Student Performance'}</h3>
                            <p>${short.classSection || 'Pine Hills Activity'}</p>
                        </div>
                    </div>
                `;
                feed.insertAdjacentHTML('beforeend', fullscreenShortHTML);
            });

            modal.style.display = 'block';
            document.body.style.overflow = 'hidden'; 

            const targetElement = document.getElementById(`short-block-${startIndex}`);
            if(targetElement) targetElement.scrollIntoView();

            initVerticalShortsObserver();
        }

        function initVerticalShortsObserver() {
            if(shortsObserver) shortsObserver.disconnect();
            const options = { root: document.getElementById('shortsModal'), threshold: 0.6 };

            shortsObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (!video) return;

                    if (entry.isIntersecting) {
                        // Lazy load content instantly on active viewport scroll block
                        if(!video.src) { video.src = video.getAttribute('data-src'); }
                        video.play().catch(e => {});
                    } else {
                        video.pause();
                    }
                });
            }, options);

            const activeShortContainers = document.querySelectorAll('.fullscreen-short-container');
            activeShortContainers.forEach(container => shortsObserver.observe(container));
        }

        function closeShortsModal() {
            document.getElementById('shortsModal').style.display = 'none';
            document.body.style.overflow = 'auto'; 
            document.querySelectorAll('.shorts-fullscreen-video').forEach(v => {
                v.pause();
                v.removeAttribute('src'); // Completely flush streaming heap allocation memory 
                v.load();
            });
            if(shortsObserver) shortsObserver.disconnect();
        }

        function startFirstVideo(id) {
            const overlay = document.getElementById(`overlay-${id}`);
            const video = document.getElementById(`vid-${id}`);
            if (overlay) overlay.classList.add('hidden');
            if (video) {
                if(!video.src) { video.src = video.getAttribute('data-src'); }
                video.play();
            }
            hasUserActivated = true;
        }

        function initScrollAutoplay() {
            const options = { root: null, threshold: 0.6 };
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target;
                    const overlay = video.parentElement.querySelector('.video-overlay');
                    if (entry.isIntersecting) {
                        if (overlay && !overlay.classList.contains('hidden')) return;
                        if (hasUserActivated) {
                            if(!video.src) { video.src = video.getAttribute('data-src'); }
                            video.play().catch(e => {});
                        }
                    } else {
                        video.pause();
                    }
                });
            }, options);

            setTimeout(() => {
                document.querySelectorAll('.feed-video').forEach(v => observer.observe(v));
            }, 1000);
        }

        function pauseOtherVideos(currentPlayingVideo) {
            document.querySelectorAll('.feed-video').forEach(video => {
                if (video !== currentPlayingVideo) video.pause();
            });
            hasUserActivated = true;
            const activeOverlay = currentPlayingVideo.parentElement.querySelector('.video-overlay');
            if(activeOverlay) activeOverlay.classList.add('hidden');
        }

        function toggleCommentsBox(id) {
            const box = document.getElementById(`comments-box-${id}`);
            box.style.display = box.style.display === 'block' ? 'none' : 'block';
        }

        async function postComment(id) {
            const nameIn = document.getElementById(`name-input-${id}`);
            const textIn = document.getElementById(`text-input-${id}`);
            if(!nameIn.value.trim() || !textIn.value.trim()) return;

            const newCmt = { name: nameIn.value.trim(), text: textIn.value.trim() };
            window.globalComments[id].push(newCmt);

            document.getElementById(`comments-list-${id}`).insertAdjacentHTML('beforeend', `
                <div class="single-comment"><div class="comment-author">${newCmt.name}</div><div>${newCmt.text}</div></div>
            `);
            
            const cmtBtnText = document.querySelector(`.cmt-btn-txt-${id}`);
            if(cmtBtnText) cmtBtnText.innerText = `Comments (${window.globalComments[id].length})`;
            textIn.value = "";

            try {
                await window.updateDoc(window.doc(window.db, "activities", id), { comments: window.globalComments[id] });
            } catch(e) { console.log(e); }
        }

        async function handleLike(btn, id) {
            let likesObj = JSON.parse(localStorage.getItem('yt_liked') || '{}');
            let span = btn.querySelector('span');
            let count = parseInt(span.innerText) || 0;

            if(likesObj[id]) { btn.classList.remove('liked'); count--; delete likesObj[id]; } 
            else { btn.classList.add('liked'); count++; likesObj[id] = true; }

            span.innerText = count;
            localStorage.setItem('yt_liked', JSON.stringify(likesObj));

            try {
                await window.updateDoc(window.doc(window.db, "activities", id), { likes: count });
            } catch(e) { console.log(e); }
        }

        function shareVideo(name) {
            const msg = encodeURIComponent(`Watch ${name}'s amazing performance on Pine Hills School portal: ${window.location.href}`);
            window.open(`https://api.whatsapp.com/send?text=${msg}`, '_blank');
        }

        function searchVideos() {
            const val = document.getElementById('studentSearch').value.toLowerCase().trim();
            let hasResults = false;

            document.querySelectorAll('.youtube-card').forEach(c => {
                if(c.getAttribute('data-name').includes(val)) { c.style.display = 'flex'; hasResults = true; } 
                else { c.style.display = 'none'; const v = c.querySelector('video'); if(v) v.pause(); }
            });

            document.querySelectorAll('.short-card').forEach(c => {
                if(c.getAttribute('data-name').includes(val)) { c.style.display = 'block'; hasResults = true; } 
                else c.style.display = 'none';
            });

            document.getElementById('noResults').style.display = hasResults ? 'none' : 'block';
        }
    </script>
</body>
</html>
