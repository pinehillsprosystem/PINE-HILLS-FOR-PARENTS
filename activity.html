<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Student Activity - Pine Hills School</title>
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --white: #ffffff;
            --yt-dark: #0f0f0f;
            --yt-card-bg: #212121;
            --yt-red: #ff0000;
            --yt-grey: rgba(255, 255, 255, 0.1);
            --yt-grey-hover: rgba(255, 255, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        
        html, body { 
            height: 100%; 
            width: 100%; 
            background-color: var(--yt-dark); 
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- YOUTUBE HEADER --- */
        header {
            width: 100%;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            z-index: 2000;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .back-btn {
            color: var(--white);
            font-size: 20px;
            text-decoration: none;
            padding: 4px 8px;
        }

        .search-container {
            position: relative;
            flex-grow: 1;
            border-radius: 40px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 100%;
            padding: 10px 15px 10px 45px;
            border: none;
            outline: none;
            font-size: 15px;
            color: var(--white);
            background: transparent;
        }
        .search-input::placeholder { color: rgba(255, 255, 255, 0.5); }

        .search-icon {
            position: absolute;
            left: 16px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
        }

        /* --- YOUTUBE SHORTS FEED (NORMAL MODE) --- */
        .results-feed {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .results-feed::-webkit-scrollbar { display: none; }

        .activity-marksheet-card {
            position: relative;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            flex-shrink: 0;
            overflow: hidden;
            background: #000;
        }

        .video-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
            cursor: pointer;
            position: relative;
        }
        
        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            z-index: 2;
        }

        /* LOCK OVERLAY */
        .initial-lock-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .initial-lock-overlay i { color: var(--white); font-size: 60px; opacity: 0.9; }
        .initial-lock-overlay.hidden { display: none !important; }

        /* --- YOUTUBE SEARCH GRID LAYOUT (JAB SEARCH KAREIN) --- */
        .results-feed.grid-mode {
            display: grid !important;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 80px 12px 20px 12px;
            overflow-y: auto;
            scroll-snap-type: none;
            background: var(--yt-dark);
        }

        .results-feed.grid-mode .activity-marksheet-card {
            height: 290px !important;
            border-radius: 12px;
            overflow: hidden;
            background: var(--yt-card-bg);
            scroll-snap-align: unset;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Grid Mode overrides to look like YT Search results */
        .results-feed.grid-mode .youtube-sidebar { display: none !important; }
        .results-feed.grid-mode .initial-lock-overlay { display: none !important; }
        .results-feed.grid-mode .student-profile {
            padding: 12px 10px;
            position: relative;
            background: var(--yt-card-bg);
            height: auto;
        }
        .results-feed.grid-mode .val { font-size: 13px; color: var(--white); font-weight: 500; }
        .results-feed.grid-mode .cls-sec { font-size: 11px; color: #aaa; margin-top: 2px; }
        .results-feed.grid-mode .lbl { display: none; }
        .results-feed.grid-mode .video-wrapper { height: 75%; }
        .results-feed.grid-mode .video-wrapper video { object-fit: cover !important; }

        /* LOADER (YT RED) */
        .video-loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 35px; height: 35px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--yt-red); 
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            z-index: 5;
        }
        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .play-pause-overlay-icon {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            color: rgba(255, 255, 255, 0.9);
            font-size: 50px;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }
        .play-pause-overlay-icon.animate-pop { opacity: 1; transform: translate(-50%, -50%) scale(1.1); transition: all 0.2s ease; }

        /* YOUTUBE SHORTS SIDEBAR BUTTONS */
        .youtube-sidebar {
            position: absolute;
            right: 12px; bottom: 100px;
            display: flex; flex-direction: column;
            align-items: center; gap: 16px; z-index: 150;
        }
        .sidebar-action-item { 
            display: flex; flex-direction: column; align-items: center; color: var(--white); cursor: pointer; 
        }
        .sidebar-action-button {
            width: 45px; height: 45px;
            background: var(--yt-grey);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 5px;
            transition: background 0.2s;
        }
        .sidebar-action-button:hover { background: var(--yt-grey-hover); }
        .sidebar-action-item i { font-size: 20px; }
        .sidebar-action-item.liked .sidebar-action-button { background: var(--yt-red); }
        .sidebar-action-item.favorited i { color: #ffca28; }
        .sidebar-action-item span { font-size: 12px; font-weight: 400; color: #f1f1f1; }

        /* PROFILE OVERLAY (SHORTS STYLE) */
        .student-profile {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 60px 80px 30px 16px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 20%, transparent);
            color: var(--white); z-index: 100; pointer-events: none;
            display: flex; flex-direction: column; gap: 2px;
        }
        .val { font-size: 16px; font-weight: 500; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
        .cls-sec { font-size: 13px; color: #aaa; }
        .lbl { font-size: 9px; opacity: 0.5; text-transform: uppercase; letter-spacing: 0.5px; }

        /* YOUTUBE STYLE COMMENT PANEL */
        .comment-drawer {
            position: fixed;
            bottom: -100%; left: 0; width: 100%; height: 65%;
            background: #212121; border-top-left-radius: 16px; border-top-right-radius: 16px;
            z-index: 3000; transition: bottom 0.3s ease-out;
            display: flex; flex-direction: column; padding: 16px; color: var(--white);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .comment-drawer.open { bottom: 0; }
        .comment-drawer-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .close-comments { background: none; border: none; font-size: 20px; color: var(--white); cursor: pointer; }
        .comments-list { flex-grow: 1; overflow-y: auto; padding: 15px 0; display: flex; flex-direction: column; gap: 14px; }
        .comment-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; font-size: 13px; border: 1px solid rgba(255,255,255,0.02); }
        .comment-user { font-weight: 500; color: #3ea6ff; margin-bottom: 2px; }
        .comment-form { display: flex; flex-direction: column; gap: 8px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px; }
        .comment-form input { width: 100%; padding: 10px 14px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; outline: none; }
        .comment-form input:focus { border-color: #3ea6ff; }
        .comment-submit-btn { width: 100%; background: #fff; color: #000; border: none; padding: 10px; border-radius: 6px; font-weight: 500; cursor: pointer; }

        .drawer-backdrop { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index: 2500; display:none; }
        .drawer-backdrop.show { display: block; }

        .no-results { text-align: center; padding: 60px 20px; color: #aaa; display: none; grid-column: span 2; }
        .no-results i { font-size: 40px; margin-bottom: 10px; color: var(--yt-red); }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="studentSearch" class="search-input" placeholder="Search student name..." onkeyup="searchStudent()">
        </div>
    </header>

    <div class="drawer-backdrop" id="drawerBackdrop" onclick="closeCommentDrawer()"></div>

    <!-- YT COMMENTS -->
    <div class="comment-drawer" id="commentDrawer">
        <div class="comment-drawer-header">
            <h3>Comments (<span id="totalCommentCount">0</span>)</h3>
            <button class="close-comments" onclick="closeCommentDrawer()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="comments-list" id="commentsListContainer"></div>
        <div class="comment-form">
            <input type="text" id="parentNameInput" placeholder="Your Name...">
            <input type="text" id="parentCommentInput" placeholder="Add a public comment...">
            <button class="comment-submit-btn" onclick="submitParentComment()">Comment</button>
        </div>
    </div>

    <!-- YT FEED CONTAINER -->
    <div class="results-feed" id="resultsFeed">
        <div class="no-results" id="noResults">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <h3>No results found</h3>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDATM3pz-eauXtxt6t3V_shp-WBhuTuovI",
            authDomain: "pine-hills-school.firebaseapp.com",
            databaseURL: "https://pine-hills-school-default-rtdb.firebaseio.com",
            projectId: "pine-hills-school",
            storageBucket: "pine-hills-school.firebasestorage.app",
            messagingSenderId: "310029732655",
            appId: "1:310029732655:web:37edd331495239524cefda"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const feed = document.getElementById('resultsFeed');

        window.db = db;
        window.updateDoc = updateDoc;
        window.doc = doc;

        const q = query(collection(db, "activities"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const noResultsHTML = document.getElementById('noResults').outerHTML;
            
            if (feed.children.length <= 1) {
                feed.innerHTML = noResultsHTML;
                if (snapshot.empty) return;

                let isFirstCard = true;
                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const id = docSnap.id;
                    window.globalCommentsStorage[id] = data.comments || [];

                    const userLikes = JSON.parse(localStorage.getItem('user_liked_activities') || '{}');
                    const isLikedByMe = userLikes[id] ? 'liked' : '';
                    const userFavs = JSON.parse(localStorage.getItem('user_favorited_activities') || '{}');
                    const isFavoritedByMe = userFavs[id] ? 'favorited' : '';
                    const overlayClass = isFirstCard ? '' : 'hidden';

                    const cardHTML = `
                        <div class="activity-marksheet-card" id="card-${id}" data-name="${data.studentNames ? data.studentNames.toLowerCase() : ''}" onclick="selectGridVideo('${id}')">
                            <div class="video-wrapper" onclick="togglePlayPause(this, event)">
                                <div class="initial-lock-overlay ${overlayClass}" id="lock-${id}" onclick="unlockFirstVideo('${id}', event)">
                                    <i class="fa-solid fa-play"></i>
                                </div>
                                <div class="video-loader" id="loader-${id}"></div>
                                <video id="vid-${id}" src="${data.videoUrl}" playsinline webkit-playsinline preload="auto" loop muted crossorigin="anonymous"
                                       onplaying="document.getElementById('loader-${id}').style.display='none';"
                                       onwaiting="document.getElementById('loader-${id}').style.display='block';">
                                </video>
                                <i class="fa-solid fa-play play-pause-overlay-icon"></i>
                            </div>
                            
                            <!-- YT SHORTS STYLE SIDEBAR -->
                            <div class="youtube-sidebar">
                                <div class="sidebar-action-item like-btn ${isLikedByMe}" onclick="toggleLike(this, '${id}', event)">
                                    <div class="sidebar-action-button"><i class="fa-solid fa-thumbs-up"></i></div>
                                    <span>${data.likes || 0}</span>
                                </div>
                                <div class="sidebar-action-item" onclick="openCommentDrawer('${id}', this, event)">
                                    <div class="sidebar-action-button"><i class="fa-solid fa-comment"></i></div>
                                    <span class="cmt-count">${(data.comments || []).length}</span>
                                </div>
                                <div class="sidebar-action-item fav-btn ${isFavoritedByMe}" onclick="toggleFavorite(this, '${id}', event)">
                                    <div class="sidebar-action-button"><i class="fa-solid fa-bookmark"></i></div>
                                    <span>${data.favorites || 0}</span>
                                </div>
                                <div class="sidebar-action-item" onclick="shareToWhatsApp('${data.studentNames || ''}', event)">
                                    <div class="sidebar-action-button"><i class="fa-solid fa-share"></i></div>
                                    <span>Share</span>
                                </div>
                            </div>

                            <div class="student-profile">
                                <div><span class="val">${data.studentNames || ''}</span><p class="lbl">Student Name</p></div>
                                <div><span class="cls-sec">${data.classSection || ''}</span><p class="lbl">Class & Section</p></div>
                            </div>
                        </div>
                    `;
                    feed.insertAdjacentHTML('beforeend', cardHTML);
                    isFirstCard = false;
                });
                initVideoObserver();
            }
        });
    </script>

    <script>
        window.globalCommentsStorage = {};
        let activeVideoId = "";
        let activeCounterElement = null;
        let userInteracted = false; 
        let isGridMode = false;

        function unlockFirstVideo(id, event) {
            event.stopPropagation();
            const overlay = document.getElementById(`lock-${id}`);
            const video = document.getElementById(`vid-${id}`);
            if (overlay) overlay.classList.add('hidden');
            userInteracted = true; 
            if (video) { video.muted = false; video.play().catch(e => {}); }
        }

        const observerOptions = { root: document.getElementById('resultsFeed'), rootMargin: '0px', threshold: 0.6 };
        const videoObserver = new IntersectionObserver((entries) => {
            if(isGridMode) return; 
            entries.forEach(entry => {
                const video = entry.target.querySelector('video');
                const lockOverlay = entry.target.querySelector('.initial-lock-overlay');
                if (!video) return;

                if (entry.isIntersecting) {
                    if(lockOverlay && !lockOverlay.classList.contains('hidden')) return;
                    if(userInteracted) { video.muted = false; video.play().catch(e => {}); }
                } else {
                    video.pause();
                }
            });
        }, observerOptions);

        function initVideoObserver() {
            const cards = document.querySelectorAll('.activity-marksheet-card');
            cards.forEach(card => { videoObserver.observe(card); });
        }

        function togglePlayPause(wrapper, event) {
            if(isGridMode) return; 
            event.stopPropagation();
            const video = wrapper.querySelector('video');
            const icon = wrapper.querySelector('.play-pause-overlay-icon');
            
            if(!video || !icon) return;
            userInteracted = true;
            video.muted = false;
            
            if(video.paused) {
                video.play().catch(e => { video.muted = true; video.play(); });
                icon.className = "fa-solid fa-play play-pause-overlay-icon animate-pop";
            } else {
                video.pause();
                icon.className = "fa-solid fa-pause play-pause-overlay-icon animate-pop";
            }
            setTimeout(() => { icon.classList.remove('animate-pop'); }, 500);
        }

        // YT SEARCH GRID FUNCTION
        function searchStudent() {
            const input = document.getElementById('studentSearch').value.toLowerCase().trim();
            const feed = document.getElementById('resultsFeed');
            const cards = document.querySelectorAll('.activity-marksheet-card');
            const noResults = document.getElementById('noResults');
            
            document.querySelectorAll('video').forEach(v => v.pause());

            if (input === "") {
                isGridMode = false;
                feed.classList.remove('grid-mode');
                noResults.style.display = 'none';
                
                cards.forEach(card => { card.style.display = 'block'; });
                initVideoObserver();
                return;
            }

            isGridMode = true;
            feed.classList.add('grid-mode');
            let matchFound = false;

            cards.forEach(card => {
                const nameAttr = card.getAttribute('data-name') || '';
                if (nameAttr.includes(input)) {
                    card.style.display = 'block';
                    matchFound = true;
                } else {
                    card.style.display = 'none';
                }
            });

            noResults.style.display = matchFound ? 'none' : 'block';
        }

        function selectGridVideo(id) {
            if(!isGridMode) return;

            document.getElementById('studentSearch').value = "";
            isGridMode = false;
            
            const feed = document.getElementById('resultsFeed');
            feed.classList.remove('grid-mode');
            
            const cards = document.querySelectorAll('.activity-marksheet-card');
            cards.forEach(card => { card.style.display = 'block'; });

            const targetCard = document.getElementById(`card-${id}`);
            if(targetCard) {
                targetCard.scrollIntoView();
                userInteracted = true;
                const lockOverlay = targetCard.querySelector('.initial-lock-overlay');
                if(lockOverlay) lockOverlay.classList.add('hidden');
                
                const activeVid = targetCard.querySelector('video');
                if(activeVid) {
                    activeVid.muted = false;
                    activeVid.play().catch(e => {});
                }
            }
            initVideoObserver();
        }

        function shareToWhatsApp(studentNames, event) {
            event.stopPropagation();
            const pageUrl = window.location.href;
            window.open(`https://api.whatsapp.com/send?text=Watch+student+${encodeURIComponent(studentNames)}+on+Pine+Hills+School:${encodeURIComponent(pageUrl)}`, '_blank');
        }

        function openCommentDrawer(videoId, element, event) {
            event.stopPropagation(); activeVideoId = videoId;
            activeCounterElement = element.querySelector('.cmt-count');
            renderCommentsList();
            document.getElementById('commentDrawer').classList.add('open');
            document.getElementById('drawerBackdrop').classList.add('show');
        }
        function closeCommentDrawer() {
            document.getElementById('commentDrawer').classList.remove('open');
            document.getElementById('drawerBackdrop').classList.remove('show');
        }
        function renderCommentsList() {
            const container = document.getElementById('commentsListContainer');
            const comments = window.globalCommentsStorage[activeVideoId] || [];
            document.getElementById('totalCommentCount').innerText = comments.length;
            if(comments.length === 0) { container.innerHTML = `<p style="text-align:center;font-size:13px;color:#aaa;margin-top:20px;">No comments yet.</p>`; return; }
            container.innerHTML = comments.map(c => `<div class="comment-item"><div class="comment-user">${c.name}</div><div>${c.text}</div></div>`).join('');
        }
        async function submitParentComment() {
            const nameInput = document.getElementById('parentNameInput');
            const commentInput = document.getElementById('parentCommentInput');
            if(!nameInput.value.trim() || !commentInput.value.trim()) return;
            const newComment = { name: nameInput.value.trim(), text: commentInput.value.trim() };
            window.globalCommentsStorage[activeVideoId].push(newComment);
            try {
                const docRef = window.doc(window.db, "activities", activeVideoId);
                await window.updateDoc(docRef, { comments: window.globalCommentsStorage[activeVideoId] });
            } catch (e) {}
            if(activeCounterElement) activeCounterElement.innerText = window.globalCommentsStorage[activeVideoId].length;
            commentInput.value = ""; renderCommentsList();
        }
        async function toggleLike(element, videoId, event) {
            event.stopPropagation();
            let userLikes = JSON.parse(localStorage.getItem('user_liked_activities') || '{}');
            let countSpan = element.querySelector('span');
            let currentCount = parseInt(countSpan.innerText) || 0;
            let finalCount = userLikes[videoId] ? currentCount - 1 : currentCount + 1;
            if(finalCount < 0) finalCount = 0;
            countSpan.innerText = finalCount;
            if(userLikes[videoId]) { element.classList.remove('liked'); delete userLikes[videoId]; }
            else { element.classList.add('liked'); userLikes[videoId] = true; }
            localStorage.setItem('user_liked_activities', JSON.stringify(userLikes));
            try { await window.updateDoc(window.doc(window.db, "activities", videoId), { likes: finalCount }); } catch (e) {}
        }
        async function toggleFavorite(element, videoId, event) {
            event.stopPropagation();
            let userFavs = JSON.parse(localStorage.getItem('user_favorited_activities') || '{}');
            let countSpan = element.querySelector('span');
            let currentCount = parseInt(countSpan.innerText) || 0;
            let finalCount = userFavs[videoId] ? currentCount - 1 : currentCount + 1;
            if(finalCount < 0) finalCount = 0;
            countSpan.innerText = finalCount;
            if(userFavs[videoId]) { element.classList.remove('favorited'); delete userFavs[videoId]; }
            else { element.classList.add('favorited'); userFavs[videoId] = true; }
            localStorage.setItem('user_favorited_activities', JSON.stringify(userFavs));
            try { await window.updateDoc(window.doc(window.db, "activities", videoId), { favorites: finalCount }); } catch (e_err) {}
        }
    </script>
</body>
</html>
